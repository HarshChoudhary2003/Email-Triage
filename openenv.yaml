name: email-triage-openenv
spec_version: 1
version: "1.0.0"
license: MIT
description: >
  A real-world email triage environment where AI agents learn to classify,
  prioritize, and route emails.
  
author: "hackathon-submission"
tags: ["email", "triage", "classification", "nlp", "real-world"]

tasks:
  - id: task_1_binary_triage
    name: "Binary Email Triage (Easy)"
    difficulty: easy
    max_steps: 10
    success_threshold: 0.8
    description: "Classify each email as actionable or not_actionable."

  - id: task_2_priority_labeling
    name: "Priority Labeling (Medium)"
    difficulty: medium
    max_steps: 15
    success_threshold: 0.7
    description: "Assign 5-class priority label and detect if a reply is required."

  - id: task_3_full_triage
    name: "Full Inbox Triage (Hard)"
    difficulty: hard
    max_steps: 30
    success_threshold: 0.65
    description: "Full triage: priority label + category + reply flag + action summary."

observation_space:
  type: object
  fields:
    task_id: string
    task_description: string
    current_email:
      id: string
      subject: string
      sender: string
      body: string
      timestamp: string
    emails_remaining: integer
    emails_processed: integer
    total_emails: integer
    last_action_feedback: string
    cumulative_score: float
    done: boolean
    valid_labels: list[string]
    valid_categories: list[string]

action_space:
  type: object
  fields:
    binary_label: string
    priority_label: string
    requires_reply: boolean
    category: string
    action_summary: string
    skip: boolean

reward:
  min: 0.0
  max: 1.0
  type: dense
  description: "Step reward with partial credit."

api:
  reset: POST /reset
  step: POST /step
  state: GET /state
  health: GET /health
  tasks: GET /tasks

deployment:
  platform: huggingface-spaces
  framework: fastapi
  port: 7860
